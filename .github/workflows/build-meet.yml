name: build-meet

# Baut das Meet-UI-Image (livekit-examples/meet, Version aus meet/upstream.ref)
# und pusht nach GHCR. Image ist public; Secrets kommen erst zur Laufzeit aus
# dem K8s-Secret -- KEIN Secret in build-args oder ENVs aufnehmen.
on:
  push:
    branches: [master]
    paths:
      - 'meet/**'
      - '.github/workflows/build-meet.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/it4change/livekit/meet

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve upstream ref
        id: ref
        run: |
          REF=$(grep -v '^#' meet/upstream.ref | grep -v '^$' | head -1 | tr -d '[:space:]')
          if [ -z "$REF" ]; then
            echo "::error file=meet/upstream.ref::no ref configured"
            exit 1
          fi
          echo "value=$REF" >>"$GITHUB_OUTPUT"
          echo "Pinned upstream ref: $REF"

      - name: Checkout livekit-examples/meet
        uses: actions/checkout@v4
        with:
          repository: livekit-examples/meet
          ref: ${{ steps.ref.outputs.value }}
          path: meet/upstream
          # Upstream nutzt Git LFS fuer die Background-JPGs in public/.
          # Ohne lfs:true kommen nur Pointer-Dateien an und der Next.js
          # Image-Import wirft "is not a valid image file".
          lfs: true

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: meet
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
